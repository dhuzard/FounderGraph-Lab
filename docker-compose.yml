services:
  app:
    build: .
    container_name: foundergraph_lab_app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./vault:/app/vault
      - ./app:/app/app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-foundergraph_password}
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - LLM_MODEL=${LLM_MODEL:-llama3.1:8b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - PYTHONPATH=/app
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    command: streamlit run app/main.py --server.address=0.0.0.0 --server.port=8501

  neo4j:
    image: neo4j:5.20-community
    container_name: foundergraph_lab_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-foundergraph_password}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-foundergraph_password}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  qdrant:
    image: qdrant/qdrant
    container_name: foundergraph_lab_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama
    container_name: foundergraph_lab_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  ollama_data:
