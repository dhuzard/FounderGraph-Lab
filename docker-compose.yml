services:
  app:
    build: .
    container_name: fair_vcg_mentor_app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./vault:/app/vault
      - ./app:/app/app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=foundergraph_password
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - LLM_MODEL=llama3.1:8b
      - EMBEDDING_MODEL=nomic-embed-text
      - PYTHONPATH=/app
    depends_on:
      - neo4j
      - qdrant
      - ollama
    command: streamlit run app/main.py --server.address=0.0.0.0 --server.port=8501

  neo4j:
    image: neo4j:community
    container_name: fair_vcg_mentor_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/foundergraph_password
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  qdrant:
    image: qdrant/qdrant
    container_name: fair_vcg_mentor_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama
    container_name: fair_vcg_mentor_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  ollama_data:
